# Recipe: Qwen3-Next-80B-A3B-Instruct-FP8
# Qwen3-Next-80B-A3B-Instruct model in native FP8 format
# Supports solo and cluster modes with tensor parallelism

recipe_version: "1"
name: Qwen3-Next-80B-A3B-Instruct-FP8
description: vLLM serving Qwen3-Next-80B-A3B-Instruct-FP8 with Multi-Token Prediction (MTP) support

# HuggingFace model to download
model: Qwen/Qwen3-Next-80B-A3B-Instruct-FP8

# Supports both solo and cluster modes
solo_only: false

# Container image to use
container: vllm-node

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 262144

# Environment variables
env: {}

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3-Next-80B-A3B-Instruct-FP8 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --host {host} \
    --port {port} \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --max-model-len {max_model_len}
