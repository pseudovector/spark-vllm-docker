/home/jack/deploy/vllm/spark-vllm-docker/logs/vllm-qwen3-next.log {
    # Rotate daily or when size exceeds 100M
    daily
    size 100M

    # Keep 7 rotated logs (1 week of daily logs)
    rotate 7

    # Compress old logs to save space
    compress
    delaycompress

    # Don't error if log file is missing
    missingok

    # Don't rotate if log is empty
    notifempty

    # Create new log file with these permissions after rotation
    create 0644 jack jack

    # Add date extension to rotated logs (vllm.log-20260209)
    dateext
    dateformat -%Y%m%d

    # Optional: Run a command after rotation
    # postrotate
    #     echo "Log rotated at $(date)" >> /home/jack/deploy/vllm/spark-vllm-docker/logs/rotation.log
    # endscript
}
